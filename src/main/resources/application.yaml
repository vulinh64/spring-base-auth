application-properties:
  security:
    issuer-server: ${ISSUER_SERVER:http://localhost:8080}
    token-delivery: ${TOKEN_DELIVERY:COOKIE}
    jwks-path: ${JWKS_PATH:/.well-known/jwks.json}
    discovery-path: ${DISCOVERY_PATH:/.well-known/openid-configuration}
    no-auth-urls:
      - "/login"
      - "/refresh"
      - "/exchange"
      - "/health"
      - "/swagger-ui/**"
      - "/swagger-ui.html"
      - "/v3/api-docs/**"
      - "/webjars/**"
    session-token-cookie-name: ${SESSION_TOKEN_COOKIE_NAME:session_token}
    refresh-token-cookie-name: ${REFRESH_TOKEN_COOKIE_NAME:refresh_token}
    cookie-secure: ${COOKIE_SECURE:true}
    skip-service-key-verification: ${SKIP_SERVICE_KEY_VERIFICATION:false}
  message-topic:
    key-invalidated:
      topic-name: ${KEY_INVALIDATED_TOPIC:key-invalidated}
      type: KEY_INVALIDATED
  bootstrap:
    peer-database: ${BOOTSTRAP_PEER_DATABABSE:true}
spring:
  cloud.stream:
    bindings:
      keyInvalidated-out-0:
        destination: ${application-properties.message-topic.key-invalidated.topic-name}
    default-binder: rabbit
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/spring-base-auth
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:123456}
  liquibase:
    enabled: ${LIQUIBASE_ENABLED:true}
  jpa.open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:rabbitmq}
    password: ${RABBITMQ_PASSWORD:123456}
  threads.virtual.enabled: true
decorator.datasource.p6spy:
  logging: CUSTOM
  custom-appender-class: com.vulinh.utils.MyP6SpyLogging
management.endpoints.web:
  base-path: '/'
  exposure.include: health
