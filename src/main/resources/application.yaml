
application-properties:
  security:
    issuer-server: ${ISSUER_SERVER:http://localhost:8080}
    token-delivery: ${TOKEN_DELIVERY:BODY}
spring:
  datasource:
    url: jdbc:hsqldb:file:${user.home}/.hsqldb/spring-base-auth/db;shutdown=true
    username: SA
    password:
  jpa:
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.HSQLDialect
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=300s
    cache-names: clients-by-id,clients-by-client-id,passwords
  threads.virtual.enabled: true
decorator.datasource.p6spy:
  logging: CUSTOM
  custom-appender-class: com.vulinh.utils.MyP6SpyLogging