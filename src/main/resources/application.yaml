application-properties:
  security:
    # ISSUER_SERVER must not end with '/'; server.servlet.context-path (if set) must start with '/'
    issuer-server: ${ISSUER_SERVER:http://localhost:8080}${server.servlet.context-path:}
    token-delivery: ${TOKEN_DELIVERY:COOKIE}
    no-auth-urls:
      - "/login"
      - "/refresh"
      - "/health"
      - "/swagger-ui/**"
      - "/v3/api-docs/**"
    access-token-cookie-name: ${ACCESS_TOKEN_COOKIE_NAME:access_token}
    refresh-token-cookie-name: ${REFRESH_TOKEN_COOKIE_NAME:refresh_token}
    cookie-secure: ${COOKIE_SECURE:true}
  bootstrap:
    peer-database: ${BOOTSTRAP_PEER_DATABASE:true}
spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/spring-base-auth}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:123456}
  liquibase:
    enabled: ${LIQUIBASE_ENABLED:true}
  jpa.open-in-view: false
  threads.virtual.enabled: true
decorator.datasource.p6spy:
  logging: CUSTOM
  custom-appender-class: com.vulinh.utils.MyP6SpyLogging
management.endpoints.web:
  base-path: '/'
  exposure.include: health
server.servlet.context-path: '/auth'
